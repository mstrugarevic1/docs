apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: docs
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/mstrugarevic1/docs.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dummy-app
  namespace: flux-system
spec:
  interval: 1m
  path: ./clusters/kind/dummy-app
  prune: true
  sourceRef:
    kind: GitRepository
    name: docs
  timeout: 2m
  wait: true
